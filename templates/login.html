{% extends "base.html" %}

{% block title %}Login | StudyMate AI{% endblock title %}

{% block body %}

<section class="min-vh-100 bg-light d-flex align-items-center py-5">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">

                <div class="card border-0 shadow rounded-4">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <div class="display-5 mb-2">📘</div>
                            <h3 class="fw-bold mb-1">Welcome Back</h3>
                            <p class="text-muted mb-0">
                                Login to continue with StudyMate AI
                            </p>
                        </div>

                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Username
                                </label>
                                <input 
                                    type="text" 
                                    name="username" 
                                    class="form-control form-control-lg" 
                                    placeholder="Enter your username" 
                                    required
                                >
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    Password
                                </label>
                                <input 
                                    type="password" 
                                    name="password" 
                                    class="form-control form-control-lg" 
                                    placeholder="Enter your password" 
                                    required
                                >
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                Login
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted mb-0">
                                Don't have an account?
                                <a href="{% url 'register' %}" class="fw-semibold text-decoration-none">
                                    Create account
                                </a>
                            </p>
                        </div>

                    </div>
                </div>

                <p class="text-center text-muted small mt-3">
                    Upload notes. Ask questions. Learn faster.
                </p>

            </div>
        </div>

    </div>
</section>

{% endblock body %}
