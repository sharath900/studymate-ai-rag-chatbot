{% extends "base.html" %}

{% block title %}Register | StudyMate AI{% endblock title %}

{% block body %}

<section class="min-vh-100 bg-light d-flex align-items-center py-5">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card border-0 shadow rounded-4">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <div class="display-5 mb-2">📘</div>
                            <h3 class="fw-bold mb-1">Create Account</h3>
                            <p class="text-muted mb-0">
                                Register to start using StudyMate AI
                            </p>
                        </div>

                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Username
                                </label>
                                <input 
                                    type="text" 
                                    name="username" 
                                    class="form-control form-control-lg" 
                                    placeholder="Choose a username" 
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Email
                                </label>
                                <input 
                                    type="email" 
                                    name="email" 
                                    class="form-control form-control-lg" 
                                    placeholder="Enter your email" 
                                    required
                                >
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">
                                    Password
                                </label>
                                <input 
                                    type="password" 
                                    name="password" 
                                    class="form-control form-control-lg" 
                                    placeholder="Create password" 
                                    required
                                >
                            </div>

                            <div class="mb-4">
                                <label class="form-label fw-semibold">
                                    Confirm Password
                                </label>
                                <input 
                                    type="password" 
                                    name="confirm_password" 
                                    class="form-control form-control-lg" 
                                    placeholder="Confirm password" 
                                    required
                                >
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                Create Account
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted mb-0">
                                Already have an account?
                                <a href="{% url 'login' %}" class="fw-semibold text-decoration-none">
                                    Login
                                </a>
                            </p>
                        </div>

                    </div>
                </div>

                <p class="text-center text-muted small mt-3">
                    Upload notes. Ask questions. Learn faster.
                </p>

            </div>
        </div>

    </div>
</section>

{% endblock body %}
